<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO-QUEST: Sektor 1 - Membedah Sang Surya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- KESEPAKATAN TEMA & WARNA STANDAR --- */
        :root {
            --space-blue: #0B0D17;
            --galactic-purple: #2D1B4E;
            --neon-cyan: #00F2FF;
            --neon-orange: #FF9900;
            --neon-green: #00E676;
            --neon-pink: #FF3366;
            --cyan-glow: 0 0 15px rgba(0, 242, 255, 0.6);
            --orange-glow: 0 0 15px rgba(255, 153, 0, 0.6);
            --pink-glow: 0 0 15px rgba(255, 51, 102, 0.6);
            --green-glow: 0 0 15px rgba(0, 230, 118, 0.6);
            --ui-bg: rgba(11, 13, 23, 0.85);
            
            --font-heading: 'Fredoka', sans-serif;
            --font-body: 'Poppins', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--space-blue);
            color: #ffffff;
            font-family: var(--font-body);
            
            /* KUNCI LAYAR ANTI-TERPOTONG STANDAR BARU */
            min-height: 100dvh;
            width: 100vw;
            overflow: hidden; 
            
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- LATAR BELAKANG --- */
        .nebula-bg {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2048&auto=format&fit=crop') no-repeat center center/cover;
            z-index: 1; opacity: 0.4; animation: panSpace 60s infinite alternate linear;
            pointer-events: none;
        }
        @keyframes panSpace {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(-2%, 2%); }
        }

        .cockpit-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9), inset 0 0 20px rgba(0, 242, 255, 0.3);
            border: 2px solid rgba(0, 242, 255, 0.1);
            pointer-events: none; z-index: 10;
        }

        /* --- CONTAINER UTAMA (Split Layout 16:9) --- */
        .main-wrapper {
            position: relative; z-index: 20;
            width: 96%; max-width: 1800px; 
            height: 94dvh; 
            display: flex; flex-direction: row; gap: 3vw;
            animation: fadeIn 0.8s ease-out;
            padding: 2vh 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* --- KIRI: PANEL TEKS (42% Lebar) --- */
        .left-panel {
            flex: 0.42;
            display: flex; flex-direction: column; justify-content: space-between; 
            height: 100%; gap: 1.5vh; 
        }
        
        .sector-title {
            font-family: var(--font-heading); 
            font-size: clamp(2rem, 3.2vw, 4rem); 
            font-weight: 700; color: var(--neon-orange); text-transform: uppercase; 
            line-height: 1.1; text-shadow: var(--orange-glow); 
            flex-shrink: 0; margin-bottom: 0;
        }
        
        /* Kotak Intro */
        .vo-box {
            background: var(--ui-bg); backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 242, 255, 0.3); border-left: 6px solid var(--neon-cyan);
            padding: 1.5vh 1.5vw; border-radius: 12px; 
            font-family: var(--font-body); 
            font-size: clamp(0.9rem, 1.2vw, 1.3rem); 
            color: #E2E8F0; line-height: 1.5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(0, 242, 255, 0.05);
            flex-shrink: 0;
        }
        .highlight { color: var(--neon-orange); font-weight: 600; text-shadow: var(--orange-glow);}

        /* Kotak Detail Lapisan Dinamis */
        .detail-box {
            flex: 1; 
            background: rgba(45, 27, 78, 0.6); backdrop-filter: blur(10px);
            border: 2px solid var(--neon-cyan); border-radius: 20px; 
            padding: 2.5vh 2vw; box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 242, 255, 0.1);
            display: flex; flex-direction: column; justify-content: center;
            overflow-y: auto; 
        }
        .detail-box::-webkit-scrollbar { width: 6px; }
        .detail-box::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }

        .layer-name { 
            font-family: var(--font-heading); font-size: clamp(1.4rem, 2.2vw, 2.8rem); 
            color: var(--neon-cyan); margin-bottom: 1.5vh; text-transform: uppercase; 
            border-bottom: 2px dashed rgba(255, 255, 255, 0.3); padding-bottom: 1vh;
            text-shadow: var(--cyan-glow); flex-shrink: 0; transition: 0.3s;
        }
        
        .layer-desc { 
            font-size: clamp(0.9rem, 1.2vw, 1.4rem); line-height: 1.6; 
            font-weight: 400; color: #F8FAFC; 
            overflow: visible; 
        }
        
        .layer-stat { 
            margin-top: 2vh; display: inline-block; background: rgba(0, 242, 255, 0.1); 
            padding: 1vh 1.5vw; border-radius: 10px; font-family: var(--font-heading); 
            color: var(--neon-cyan); font-size: clamp(0.9rem, 1.2vw, 1.4rem); 
            border: 2px solid var(--neon-cyan); box-shadow: var(--cyan-glow); 
            align-self: flex-start; letter-spacing: 1px; flex-shrink: 0; transition: 0.3s;
        }

        /* --- NAVIGASI STANDAR (POSISI TETAP DI BAWAH) --- */
        .nav-container {
            display: flex; gap: 2vh; flex-direction: row; margin-top: auto; flex-shrink: 0;
        }
        
        .btn-nav {
            flex: 1; background: rgba(0, 242, 255, 0.1); 
            border: 2px solid var(--neon-cyan); color: var(--neon-cyan); 
            font-family: var(--font-heading); 
            font-size: clamp(0.9rem, 1.2vw, 1.3rem); 
            padding: 1.5vh 0; border-radius: 12px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-nav svg { width: clamp(18px, 1.5vw, 22px); height: clamp(18px, 1.5vw, 22px); transition: 0.3s; }
        
        .btn-nav.back { fill: var(--neon-cyan); }
        .btn-nav.back:hover { background: var(--neon-cyan); color: var(--space-blue); box-shadow: var(--cyan-glow); transform: translateY(-3px);}
        .btn-nav.back:hover svg { fill: var(--space-blue); transform: translateX(-5px); }

        .btn-nav.next { border-color: var(--neon-orange); color: var(--neon-orange); fill: var(--neon-orange); background: rgba(255, 153, 0, 0.1);}
        .btn-nav.next:hover { background: var(--neon-orange); color: var(--space-blue); box-shadow: var(--orange-glow); transform: translateY(-3px);}
        .btn-nav.next:hover svg { fill: var(--space-blue); transform: translateX(5px); }

        /* --- KANAN: PANEL VISUAL MATAHARI (58% Lebar) --- */
        .right-panel {
            flex: 0.58; position: relative;
            background: rgba(11, 13, 23, 0.6); border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 25px; box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; backdrop-filter: blur(5px);
        }

        /* SVG Matahari */
        .sun-container {
            position: absolute; width: clamp(300px, 45vw, 700px); height: clamp(300px, 45vw, 700px);
            transform: scale(1); transition: transform 1s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 2;
        }
        .sun-container.zoom-inti { transform: scale(1.6); }
        .sun-container.zoom-fotosfer { transform: scale(1.3); }
        .sun-container.zoom-kromosfer { transform: scale(1.1); }
        .sun-container.zoom-korona { transform: scale(0.95); }

        .sun-layer { transition: all 0.5s ease; transform-origin: center; cursor: pointer; }
        .sun-layer:hover { filter: brightness(1.2); }
        .sun-container.active-layer .sun-layer { opacity: 0.3; }
        
        /* Efek nyala saat lapisan diklik */
        .sun-container.active-layer .sun-layer.highlighted { 
            opacity: 1; 
            filter: drop-shadow(0 0 30px var(--neon-orange)); 
            stroke: #FFF; stroke-width: 4px; 
        }

        /* Hotspots (Panel Tombol di Pojok) */
        .hotspot-container { 
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; 
            z-index: 10; pointer-events: none; 
        }
        
        .hotspot {
            position: absolute; pointer-events: auto;
            background: rgba(11, 13, 23, 0.8); border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); font-family: var(--font-heading); 
            font-size: clamp(0.85rem, 1.1vw, 1.2rem); font-weight: 600; letter-spacing: 1px;
            padding: 1vh 1.2vw; border-radius: 10px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; backdrop-filter: blur(5px);
        }
        
        .hotspot:hover { background: rgba(0, 242, 255, 0.2); transform: translateY(-3px); box-shadow: var(--cyan-glow); }
        
        .hotspot.active { 
            background: var(--neon-cyan); color: var(--space-blue); 
            box-shadow: var(--cyan-glow); transform: scale(1.05); 
        }
        
        /* Pewarnaan Khusus Tombol Hotspot */
        #btn-korona { top: 8%; left: 8%; border-color: var(--neon-cyan); color: var(--neon-cyan);}
        #btn-korona.active { background: var(--neon-cyan); color: var(--space-blue); box-shadow: var(--cyan-glow);}

        #btn-kromosfer { bottom: 8%; left: 8%; border-color: var(--neon-pink); color: var(--neon-pink);}
        #btn-kromosfer.active { background: var(--neon-pink); color: var(--space-blue); box-shadow: var(--pink-glow);}

        #btn-fotosfer { top: 8%; right: 8%; border-color: var(--neon-orange); color: var(--neon-orange);}
        #btn-fotosfer.active { background: var(--neon-orange); color: var(--space-blue); box-shadow: var(--orange-glow);}

        #btn-inti { bottom: 8%; right: 8%; border-color: #FFF; color: #FFF;}
        #btn-inti.active { background: #FFF; color: var(--space-blue); box-shadow: 0 0 20px #FFF;}

        /* --- RESPONSIVE MOBILE & TABLET (Mode Portrait) --- */
        @media (max-width: 1024px) {
            body { 
                height: auto; min-height: 100dvh; 
                overflow-y: auto; 
                align-items: flex-start; padding: 20px 0;
            }
            .main-wrapper { 
                flex-direction: column; width: 95%; height: auto; 
                margin: 0 auto; gap: 20px; padding: 15px; overflow: visible;
            }
            .left-panel, .right-panel { flex: none; width: 100%; height: auto; }
            .right-panel { height: 50vh; min-height: 400px; margin-bottom: 20px; }
            .sun-container { width: 350px; height: 350px; }
            
            .sector-title { font-size: 2.8rem; text-align: center; }
            .nav-container { flex-direction: column; }
            
            .hotspot { font-size: 1rem; padding: 8px 12px; }
            #btn-korona { top: 5%; left: 5%; } #btn-kromosfer { bottom: 5%; left: 5%; }
            #btn-fotosfer { top: 5%; right: 5%; } #btn-inti { bottom: 5%; right: 5%; }
        }

        @media (max-width: 600px) {
            .sector-title { font-size: 2.2rem; }
            .vo-box, .layer-desc, .layer-stat { font-size: 1rem; }
            .layer-name { font-size: 1.5rem; }
            .btn-nav { font-size: 1.1rem; padding: 15px 0;}
            .sun-container { width: 280px; height: 280px; }
            .hotspot { font-size: 0.8rem; padding: 5px 8px; }
        }
    </style>
</head>
<body>

    <audio id="audioHum" src="https://www.soundjay.com/nature/sounds/space-drone-1.mp3" loop autoplay></audio>
    <audio id="audioPop" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <div class="nebula-bg"></div>
    <div class="cockpit-frame"></div>

    <div class="main-wrapper">
        
        <div class="left-panel">
            <h1 class="sector-title">☀️ Anatomi Matahari</h1>
            
            <div class="vo-box">
                "Halo Kapten <span id="namaKapten" class="highlight">[Kapten]</span>! Silakan klik lapisan pada Visual Matahari di kanan, atau gunakan panel tombol untuk membedah anatominya!"
            </div>

            <div id="infoBox" class="detail-box">
                <div id="infoName" class="layer-name">MENUNGGU INPUT...</div>
                <div id="infoDesc" class="layer-desc">Inisiasi pemindaian... Silakan pilih lapisan Matahari melalui tombol di layar visual radar untuk melihat data lengkapnya.</div>
                <div id="infoStat" class="layer-stat" style="display:none;"></div>
            </div>

            <div class="nav-container">
                <button class="btn-nav back" onclick="navigasi('sektor_1.html')">
                    <svg viewBox="0 0 24 24"><path d="M15.41,16.59L10.83,12l4.58-4.59L14,6l-6,6l6,6L15.41,16.59z"/></svg>
                    KEMBALI KE SEKTOR 1
                </button>
                <button class="btn-nav next" onclick="navigasi('menu 3 sektor.html')">
                    SELESAI & KE MENU
                    <svg viewBox="0 0 24 24"><path d="M8.59,16.59L13.17,12L8.59,7.41L10,6l6,6l-6,6L8.59,16.59z"/></svg>
                </button>
            </div>
        </div>

        <div class="right-panel">
            
            <div id="sunGraphic" class="sun-container">
                <svg viewBox="0 0 600 600" width="100%" height="100%">
                    <defs>
                        <radialGradient id="gradKorona" cx="50%" cy="50%" r="50%">
                            <stop offset="70%" stop-color="rgba(255, 255, 255, 0.4)"/>
                            <stop offset="100%" stop-color="rgba(255, 255, 255, 0)"/>
                        </radialGradient>
                    </defs>
                    <circle id="layer-korona" class="sun-layer" cx="300" cy="300" r="280" fill="url(#gradKorona)" onclick="bukaLapisan('korona')"/>
                    <circle id="layer-kromosfer" class="sun-layer" cx="300" cy="300" r="210" fill="#FF3366" onclick="bukaLapisan('kromosfer')"/>
                    <circle id="layer-fotosfer" class="sun-layer" cx="300" cy="300" r="180" fill="#FF9900" onclick="bukaLapisan('fotosfer')"/>
                    <circle id="layer-inti" class="sun-layer" cx="300" cy="300" r="70" fill="#FFFFFF" filter="drop-shadow(0 0 15px #FFF)" onclick="bukaLapisan('inti')"/>
                </svg>
            </div>

            <div class="hotspot-container">
                <button id="btn-korona" class="hotspot" onclick="bukaLapisan('korona')">KORONA</button>
                <button id="btn-kromosfer" class="hotspot" onclick="bukaLapisan('kromosfer')">KROMOSFER</button>
                <button id="btn-fotosfer" class="hotspot" onclick="bukaLapisan('fotosfer')">FOTOSFER</button>
                <button id="btn-inti" class="hotspot" onclick="bukaLapisan('inti')">INTI</button>
            </div>
        </div>

    </div>

    <script>
        window.onload = () => {
            const astronotName = localStorage.getItem('AstronotName') || 'Penjelajah';
            document.getElementById('namaKapten').innerText = astronotName.toUpperCase();
            
            // Atur volume BGM
            const bgm = document.getElementById('audioHum');
            if(bgm) bgm.volume = 0.1;
        };

        const dataLapisan = {
            inti: {
                nama: "🔥 INTI MATAHARI",
                color: "#FFFFFF",
                bg: "rgba(255, 255, 255, 0.2)",
                desc: "Pusat reaktor alam semesta! Di sini terjadi reaksi fusi nuklir yang mengubah hidrogen menjadi helium. Energi luar biasa inilah yang menyinari seluruh Tata Surya kita.",
                stat: "SUHU: ± 15 Juta °C"
            },
            fotosfer: {
                nama: "☀️ FOTOSFER",
                color: "var(--neon-orange)",
                bg: "rgba(255, 153, 0, 0.1)",
                desc: "Ini adalah 'permukaan' silau Matahari yang kita lihat dari Bumi. Lapisan ini memancarkan cahaya keemasan dan sering memiliki bintik hitam (Sunspots) akibat anomali medan magnet.",
                stat: "SUHU: ± 5.500 °C"
            },
            kromosfer: {
                nama: "🔴 KROMOSFER",
                color: "var(--neon-pink)",
                bg: "rgba(255, 51, 102, 0.1)",
                desc: "Lapisan atmosfer bagian bawah berbentuk gelang gas kemerahan. Biasanya lapisan ini hanya bisa terlihat oleh mata kita saat terjadi Gerhana Matahari Total.",
                stat: "SUHU: 4.000 - 10.000 °C"
            },
            korona: {
                nama: "👑 KORONA",
                color: "var(--neon-cyan)",
                bg: "rgba(0, 242, 255, 0.1)",
                desc: "Atmosfer terluar yang membentang jutaan kilometer ke luar angkasa. Gasnya sangat tipis tetapi secara misterius memiliki suhu yang jauh lebih panas daripada permukaan matahari.",
                stat: "SUHU: ± 1 Juta °C"
            }
        };

        function bukaLapisan(lapisanId) {
            // Mainkan SFX
            const sound = document.getElementById('audioPop');
            sound.currentTime = 0; sound.play().catch(e=>{});

            const sunGraphic = document.getElementById('sunGraphic');
            const layerName = document.getElementById('infoName');
            const layerStat = document.getElementById('infoStat');
            
            const data = dataLapisan[lapisanId];

            // Update Teks Panel Kiri Dinamis
            layerName.innerHTML = data.nama;
            layerName.style.color = data.color;
            layerName.style.borderBottomColor = data.color;
            layerName.style.textShadow = `0 0 15px ${data.color}`;

            document.getElementById('infoDesc').innerHTML = data.desc;
            
            layerStat.innerHTML = data.stat;
            layerStat.style.color = data.color;
            layerStat.style.borderColor = data.color;
            layerStat.style.boxShadow = `0 0 15px ${data.color}`;
            layerStat.style.background = data.bg;
            layerStat.style.display = "inline-block";

            // Ganti border detail box
            document.getElementById('infoBox').style.borderColor = data.color;

            // Animasi Zoom SVG
            sunGraphic.className = "sun-container active-layer zoom-" + lapisanId;
            
            // Reset Highlight Layer SVG
            document.querySelectorAll('.sun-layer').forEach(el => el.classList.remove('highlighted'));
            document.getElementById('layer-' + lapisanId).classList.add('highlighted');

            // Reset Warna Hotspot
            document.querySelectorAll('.hotspot').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + lapisanId).classList.add('active');
        }

        function navigasi(url) {
            const sound = document.getElementById('audioPop');
            sound.currentTime = 0; sound.play().catch(e=>{});
            setTimeout(() => { window.location.href = url; }, 300);
        }
    </script>
</body>
</html>
