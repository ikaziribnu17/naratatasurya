<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO-QUEST: Galactic Menu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- KESEPAKATAN TEMA & WARNA --- */
        :root {
            --space-blue: #0B0D17;
            --galactic-purple: #2D1B4E;
            --neon-cyan: #00F2FF;
            --neon-orange: #FF9900;
            --cyan-glow: 0 0 15px rgba(0, 242, 255, 0.6);
            --orange-glow: 0 0 15px rgba(255, 153, 0, 0.6);
            --ui-bg: rgba(11, 13, 23, 0.85);
            --error-red: #FF3366;
            
            --font-heading: 'Fredoka', sans-serif;
            --font-body: 'Poppins', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--space-blue);
            color: #ffffff;
            font-family: var(--font-body);
            height: 100dvh;
            width: 100vw;
            overflow-x: hidden;
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- LATAR BELAKANG --- */
        .nebula-bg {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2048&auto=format&fit=crop') no-repeat center center/cover;
            z-index: 1; opacity: 0.5; animation: panSpace 60s infinite alternate linear;
            pointer-events: none;
        }
        @keyframes panSpace {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(-2%, 2%); }
        }

        .cockpit-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9), inset 0 0 20px rgba(0, 242, 255, 0.3);
            border: 2px solid rgba(0, 242, 255, 0.1);
            pointer-events: none; z-index: 10;
        }

        /* --- LAYOUT UTAMA --- */
        .main-container {
            position: relative; z-index: 20; flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 2vh 4vw; gap: 4vw;
            width: 100%; max-width: 1400px; margin: 0 auto;
        }

        /* PANEL KIRI: ASTRO-BOT & UCAPAN */
        .left-panel {
            flex: 0.4;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; animation: slideRight 1s ease-out;
        }
        @keyframes slideRight { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }

        .astro-bot-container {
            animation: float 3s ease-in-out infinite;
            margin-bottom: 2vh;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
        }
        .astro-bot-img {
            width: clamp(150px, 18vw, 250px);
            height: auto;
            object-fit: contain;
        }
        @keyframes float { 
            0%, 100% { transform: translateY(0) rotate(2deg); } 
            50% { transform: translateY(-15px) rotate(-2deg); } 
        }

        .cockpit-panel {
            background: var(--ui-bg); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.3); border-radius: 15px;
            padding: 2.5vh 2vw; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            width: 100%;
        }
        
        .welcome-title { font-family: var(--font-heading); font-size: clamp(1.5rem, 2.5vw, 2.2rem); color: #fff; text-shadow: var(--cyan-glow); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        .welcome-desc { font-size: clamp(1rem, 1.2vw, 1.1rem); color: #A0AEC0; font-weight: 500; line-height: 1.5; }
        .highlight { color: var(--neon-cyan); font-weight: 600; text-shadow: 0 0 5px rgba(0, 242, 255, 0.4); }

        /* PANEL KANAN: GRID PLANET */
        .right-panel {
            flex: 0.6;
            display: flex; justify-content: center; align-items: center;
            animation: slideLeft 1s ease-out;
        }
        @keyframes slideLeft { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        .planet-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2.5vh 2vw; 
            width: 100%;
        }

        .planet-btn {
            background: rgba(45, 27, 78, 0.4); border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; padding: 1.5vh 1.5vw;
            transition: all 0.3s ease; text-align: left;
            backdrop-filter: blur(5px);
        }
        .planet-btn:hover {
            background: rgba(0, 242, 255, 0.05); border-color: rgba(0, 242, 255, 0.5);
            transform: scale(1.03) translateX(10px); box-shadow: var(--cyan-glow);
        }

        .css-planet {
            width: clamp(50px, 5vw, 65px); height: clamp(50px, 5vw, 65px);
            border-radius: 50%; position: relative;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.6); transition: 0.3s;
        }
        .planet-btn:hover .css-planet { box-shadow: inset -5px -5px 15px rgba(0,0,0,0.6), var(--cyan-glow); }
        .css-planet svg { width: 55%; height: 55%; fill: #fff; z-index: 2; opacity: 0.9; transition: 0.3s; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5)); }
        .planet-btn:hover .css-planet svg { transform: scale(1.1); opacity: 1; }

        .planet-text { display: flex; flex-direction: column; justify-content: center; }
        .planet-title { font-family: var(--font-heading); font-size: clamp(1.1rem, 1.3vw, 1.3rem); color: #fff; letter-spacing: 0.5px; margin-bottom: 2px; }
        .planet-desc { font-size: clamp(0.85rem, 0.9vw, 0.95rem); color: #A0AEC0; font-weight: 400;}

        /* Warna Khusus Tiap Planet */
        .p-intro .css-planet { background: radial-gradient(circle at 30% 30%, #3b82f6, #1e3a8a); }
        .p-komp .css-planet { background: radial-gradient(circle at 30% 30%, #ec4899, #831843); }
        .p-sekt .css-planet { background: radial-gradient(circle at 30% 30%, #eab308, #713f12); }
        .p-kuis .css-planet { background: radial-gradient(circle at 30% 30%, #22c55e, #14532d); }
        .p-simu .css-planet { background: radial-gradient(circle at 30% 30%, #a855f7, #581c87); }
        
        /* Final Mission - Aksen Orange */
        .planet-btn.p-eval { border-color: rgba(255, 153, 0, 0.2); }
        .p-eval .css-planet { background: radial-gradient(circle at 30% 30%, #f97316, #7c2d12); }
        .planet-btn.p-eval:hover { background: rgba(255, 153, 0, 0.05); border-color: var(--neon-orange); box-shadow: var(--orange-glow); }
        .planet-btn.p-eval:hover .css-planet { box-shadow: inset -5px -5px 15px rgba(0,0,0,0.6), var(--orange-glow); }
        .planet-btn.p-eval .planet-title { color: var(--neon-orange); }

        /* --- DASHBOARD BAWAH --- */
        .bottom-dashboard {
            position: relative; z-index: 20;
            background: var(--ui-bg); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 242, 255, 0.2);
            padding: 1.5vh 2vw; display: flex; justify-content: center; gap: clamp(15px, 3vw, 40px);
            flex-wrap: wrap; margin-top: auto;
        }
        .util-btn {
            background: transparent; border: none; color: #cbd5e1; font-family: var(--font-heading);
            font-size: clamp(1rem, 1.1vw, 1.1rem); display: flex; align-items: center; gap: 6px; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; font-weight: 500; letter-spacing: 0.5px;
        }
        .util-btn svg { width: 18px; height: 18px; fill: #cbd5e1; transition: 0.3s; }
        .util-btn:hover { color: var(--neon-cyan); }
        .util-btn:hover svg { fill: var(--neon-cyan); filter: drop-shadow(0 0 5px var(--neon-cyan)); transform: translateY(-2px); }
        .util-btn.exit:hover { color: var(--error-red); }
        .util-btn.exit:hover svg { fill: var(--error-red); filter: drop-shadow(0 0 5px var(--error-red)); }

        /* --- CUSTOM MODAL (Hanya untuk Keluar) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(11, 13, 23, 0.9); backdrop-filter: blur(5px);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box {
            background: var(--galactic-purple); border: 2px solid var(--error-red);
            padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.6); max-width: 400px; width: 90%;
            transform: scale(0.8); transition: transform 0.3s ease;
        }
        .modal-box h2 { font-family: var(--font-heading); color: var(--error-red); margin-bottom: 15px; font-size: 1.8rem; letter-spacing: 1px; }
        .modal-box p { font-size: 1.05rem; margin-bottom: 25px; line-height: 1.5; color: #F8FAFC; }
        
        .modal-btn-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;}
        
        .btn-modal-action {
            background: rgba(255, 51, 102, 0.1); border: 2px solid var(--error-red); color: var(--error-red);
            padding: 10px 25px; font-family: var(--font-heading); font-size: 1.1rem; font-weight: 500;
            border-radius: 8px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; flex: 1; min-width: 120px;
        }
        .btn-modal-action:hover { background: var(--error-red); color: #fff; box-shadow: 0 0 15px rgba(255,51,102,0.6); }

        .btn-modal-cancel {
            background: rgba(255, 255, 255, 0.05); border: 2px solid #cbd5e1; color: #cbd5e1;
            padding: 10px 25px; font-family: var(--font-heading); font-size: 1.1rem; font-weight: 500;
            border-radius: 8px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; flex: 1; min-width: 120px;
        }
        .btn-modal-cancel:hover { background: #cbd5e1; color: var(--space-blue); }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 850px) {
            .main-container { flex-direction: column; padding: 20px 15px; gap: 20px; justify-content: flex-start; }
            .left-panel { flex: none; width: 100%; }
            .astro-bot-img { width: 160px; } 
            .right-panel { flex: none; width: 100%; }
            .planet-grid { grid-template-columns: 1fr; gap: 15px; } 
            .planet-btn { padding: 12px; }
            .planet-btn:hover { transform: scale(1.02) translateX(5px); }
            .bottom-dashboard { padding: 15px; }
        }
    </style>
</head>

    <script>
        // Set Nama Kapten saat halaman dimuat
        window.onload = () => {
            const astronotName = localStorage.getItem('AstronotName') || 'Penjelajah';
            const stasiunName = localStorage.getItem('StasiunName') || 'Pangkalan Utama';
            
            document.getElementById('welcomeText').innerHTML = `Memuat koordinat misi dari <br><span class="highlight">Stasiun ${stasiunName}</span>`;
            document.querySelector('.welcome-title').innerText = `HALO, KAPTEN ${astronotName.toUpperCase()}!`;
        };

        // Navigasi Instan (Langsung pindah tanpa pop-up)
        function directNavigate(targetPage) {
            document.getElementById('audioClick').play().catch(()=>{});
            setTimeout(() => {
                window.location.href = targetPage;
            }, 300); // Jeda singkat agar suara klik terdengar
        }

        // Tampilkan Modal Konfirmasi Keluar (Warna Merah)
        function confirmExit() {
            document.getElementById('audioClick').play().catch(()=>{});
            document.getElementById('customModal').classList.add('active');
        }

        // Eksekusi Keluar ke Index
        function executeExit() {
            document.getElementById('audioClick').play().catch(()=>{});
            setTimeout(() => {
                window.location.href = "index.html";
            }, 400);
        }

        // Menutup Pop-Up Keluar
        function closeModal() {
            document.getElementById('audioClick').play().catch(()=>{});
            document.getElementById('customModal').classList.remove('active');
        }
    </script>
</body>
</html>
