<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO-QUEST: Final Mission</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- KESEPAKATAN TEMA STANDAR --- */
        :root {
            --space-blue: #0B0D17;
            --galactic-purple: #2D1B4E;
            --neon-cyan: #00F2FF;
            --neon-orange: #FF9900;
            --neon-green: #00E676;
            --neon-pink: #FF3366;
            --cyan-glow: 0 0 15px rgba(0, 242, 255, 0.6);
            --orange-glow: 0 0 15px rgba(255, 153, 0, 0.6);
            --ui-bg: rgba(11, 13, 23, 0.85);
            --font-heading: 'Fredoka', sans-serif;
            --font-body: 'Poppins', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--space-blue); color: #ffffff;
            font-family: var(--font-body);
            height: 100dvh; width: 100vw; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        /* --- BACKGROUND HYPER-SPEED --- */
        .nebula-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2048&auto=format&fit=crop') center/cover;
            z-index: 1; opacity: 0.3; pointer-events: none;
        }
        .warp-speed { animation: warp 0.5s ease-in-out; }
        @keyframes warp { 0% { filter: brightness(1) blur(0); transform: scale(1); } 50% { filter: brightness(2) blur(10px); transform: scale(1.1); } 100% { filter: brightness(1) blur(0); transform: scale(1); } }

        .cockpit-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9), inset 0 0 20px rgba(0, 242, 255, 0.3);
            border: 2px solid rgba(0, 242, 255, 0.1); pointer-events: none; z-index: 10;
        }

        /* --- LAYOUT UTAMA --- */
        .main-wrapper {
            position: relative; z-index: 20; width: 96%; max-width: 1400px; height: 96dvh; 
            display: flex; flex-direction: row; gap: 2vw; padding: 2vh 0; margin: auto;
        }

        /* --- KIRI: PANEL NAVIGASI MISI (30%) --- */
        .left-panel { flex: 0.3; display: flex; flex-direction: column; gap: 1.5vh; height: 100%; }
        
        .profile-box {
            background: rgba(45, 27, 78, 0.6); backdrop-filter: blur(10px);
            border: 2px solid var(--neon-cyan); border-radius: 15px; padding: 2vh 1.5vw;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(0, 242, 255, 0.1);
            text-align: center; flex-shrink: 0;
        }
        .profile-box h2 { font-family: var(--font-heading); color: var(--neon-cyan); font-size: 1.5rem; text-shadow: var(--cyan-glow); margin-bottom: 5px;}
        .score-display { font-family: var(--font-heading); font-size: 2.5rem; color: var(--neon-orange); text-shadow: var(--orange-glow); line-height: 1;}

        .mission-tracker {
            flex: 1; background: var(--ui-bg); border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 2vh 1vw; display: flex; flex-direction: column; gap: 1vh;
            overflow-y: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .mission-tracker::-webkit-scrollbar { width: 5px; } .mission-tracker::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 5px;}
        
        .stage-item {
            padding: 1.5vh 1vw; border-radius: 10px; background: rgba(255,255,255,0.05);
            font-family: var(--font-heading); font-size: 1rem; color: #cbd5e1;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .stage-item.active { background: rgba(0, 242, 255, 0.2); border-left: 5px solid var(--neon-cyan); color: #fff; transform: scale(1.02); }
        .stage-item.done { background: rgba(0, 230, 118, 0.1); border-left: 5px solid var(--neon-green); color: var(--neon-green); }

        /* --- KANAN: ARENA KUIS/GAME (70%) --- */
        .right-panel {
            flex: 0.7; position: relative; background: rgba(11, 13, 23, 0.8);
            border: 2px solid rgba(0, 242, 255, 0.2); border-radius: 20px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9); padding: 4vh 3vw;
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .right-panel::-webkit-scrollbar { width: 8px; } .right-panel::-webkit-scrollbar-thumb { background: var(--neon-orange); border-radius: 5px;}

        /* Elemen Game Internal */
        .stage-title { font-family: var(--font-heading); font-size: 2rem; color: var(--neon-orange); text-shadow: var(--orange-glow); text-transform: uppercase; border-bottom: 2px dashed rgba(255,255,255,0.2); padding-bottom: 1vh; margin-bottom: 2vh; text-align: center;}
        
        .question-text { font-size: 1.2rem; line-height: 1.6; margin-bottom: 3vh; color: #E2E8F0; text-align: center;}
        
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 1.5vh; }
        .btn-opt {
            background: rgba(45, 27, 78, 0.6); border: 2px solid rgba(255,255,255,0.2);
            color: #fff; padding: 2vh 2vw; border-radius: 12px; font-size: 1.1rem; font-family: var(--font-body);
            cursor: pointer; transition: 0.2s; text-align: left;
        }
        .btn-opt:hover { background: rgba(0, 242, 255, 0.2); border-color: var(--neon-cyan); }
        .btn-opt.correct { background: rgba(0, 230, 118, 0.3); border-color: var(--neon-green); box-shadow: var(--green-glow); }
        .btn-opt.wrong { background: rgba(255, 51, 102, 0.3); border-color: var(--neon-pink); }

        /* Desain Khusus Stage Gerhana (Sinkronisasi Orbit) */
        .orbit-sync-box { display: flex; justify-content: center; gap: 2vw; margin-bottom: 3vh; }
        .orbit-slot {
            width: 100px; height: 100px; border: 2px dashed var(--neon-cyan); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 3rem; background: rgba(0,0,0,0.5);
            cursor: pointer; transition: 0.3s;
        }
        .orbit-slot.filled { border-style: solid; background: rgba(0, 242, 255, 0.2); box-shadow: var(--cyan-glow); }

        /* Hasil Akhir & Sertifikat */
        .result-container { text-align: center; margin: auto; display: none; flex-direction: column; align-items: center;}
        .result-container.show { display: flex; animation: fadeIn 1s; }
        .rank-title { font-family: var(--font-heading); font-size: 3rem; margin: 2vh 0; text-transform: uppercase; }
        .btn-action {
            background: var(--neon-cyan); color: var(--space-blue); border: none; font-family: var(--font-heading);
            font-size: 1.2rem; font-weight: 700; padding: 2vh 3vw; border-radius: 12px; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; margin-top: 2vh; box-shadow: var(--cyan-glow);
        }
        .btn-action:hover { transform: translateY(-3px); background: #fff; }

        /* Responsif Mobile */
        @media (max-width: 950px) {
            .main-wrapper { flex-direction: column; height: auto; min-height: 100dvh; overflow: visible; padding: 10px;}
            .left-panel { flex: none; width: 100%; height: auto; flex-direction: row; }
            .profile-box { flex: 0.4; padding: 10px; } .profile-box h2 { font-size: 1.2rem; } .score-display { font-size: 1.8rem; }
            .mission-tracker { flex: 0.6; padding: 10px; flex-direction: row; overflow-x: auto; overflow-y: hidden;}
            .stage-item { flex-shrink: 0; padding: 10px; font-size: 0.8rem; }
            .right-panel { flex: none; width: 100%; height: 60vh; padding: 20px 15px; }
            body { overflow-y: auto; align-items: flex-start;}
        }

        /* Elemen Canvas (Tersembunyi, hanya untuk generate gambar) */
        #certCanvas { display: none; }
    </style>
</head>
<body>

    <audio id="sndClick" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="sndCorrect" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>
    <audio id="sndWrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
    <audio id="sndWarp" src="https://www.soundjay.com/space/sounds/space-engine-1.mp3"></audio>

    <div class="nebula-bg" id="bgNebula"></div>
    <div class="cockpit-frame"></div>

    <div class="main-wrapper">
        
        <div class="left-panel">
            <div class="profile-box">
                <h2>KAPTEN <span id="playerName">---</span></h2>
                <div style="font-size: 0.9rem; color: #cbd5e1;">TOTAL SKOR</div>
                <div class="score-display" id="scoreDisplay">0</div>
            </div>
            
            <div class="mission-tracker" id="trackerList">
                </div>
        </div>

        <div class="right-panel">
            
            <div id="quizArea">
                <div class="stage-title" id="stageTitle">🚀 PERSIAPAN PELUNCURAN</div>
                <div class="question-text" id="questionText">Sistem mendeteksi Anda siap untuk misi final mengelilingi 9 Sektor. Pastikan pelindung panas roket aktif.<br><br><b>Misi:</b> Raih skor minimal 80 untuk mendapatkan Sertifikat Kelulusan Resmi ASTRO-QUEST.</div>
                <div class="options-grid" id="optionsGrid">
                    <button class="btn-action" style="margin: auto;" onclick="startFinalMission()">LUNCURKAN ROKET! 🚀</button>
                </div>
            </div>

            <div class="result-container" id="resultArea">
                <div style="color: #cbd5e1; font-size: 1.5rem;">EVALUASI MISI SELESAI</div>
                <div class="rank-title" id="rankTitle">---</div>
                <div style="font-size: 1.2rem; margin-bottom: 2vh; color:#fff;" id="resultMessage">---</div>
                
                <div id="btnGroupResult">
                    </div>
            </div>

        </div>
    </div>

    <canvas id="certCanvas" width="1600" height="1130"></canvas>

    <script>
        // --- DATA MISI FINAL (25 Soal, 100 Poin) ---
        // Penyesuaian agar muat di kode: Saya rangkum intisarinya namun poin total tetap 100.
        const missions = [
            // STAGE 1: MERKURIUS (12 Poin)
            { stage: 1, name: "Sektor Merkurius", questions: [
                { q: "Suhu siang hari di Merkurius bisa mencapai 430°C, tapi malam harinya bisa turun hingga -180°C. Mengapa demikian?", opts: ["Karena memiliki banyak lautan", "Karena tidak memiliki atmosfer tebal untuk menahan panas", "Karena jaraknya jauh dari matahari"], ans: 1, pts: 4 },
                { q: "Merkurius adalah planet terkecil di tata surya.", opts: ["BENAR", "SALAH"], ans: 0, pts: 4 },
                { q: "Berapa lama waktu revolusi Merkurius mengelilingi Matahari?", opts: ["365 Hari", "88 Hari", "24 Jam"], ans: 1, pts: 4 }
            ]},
            // STAGE 2: VENUS (12 Poin)
            { stage: 2, name: "Sektor Venus", questions: [
                { q: "Planet terpanas di tata surya adalah Venus, bukan Merkurius.", opts: ["FAKTA", "MITOS"], ans: 0, pts: 4 },
                { q: "Venus berputar (rotasi) dari arah Timur ke Barat, berlawanan dengan Bumi.", opts: ["FAKTA", "MITOS"], ans: 0, pts: 4 },
                { q: "Awan di Venus terbuat dari uap air segar.", opts: ["FAKTA", "MITOS (Terbuat dari Asam Sulfat)"], ans: 1, pts: 4 }
            ]},
            // STAGE 3: BUMI & BULAN (12 Poin)
            { stage: 3, name: "Sektor Bumi", questions: [
                { q: "Apa yang menyebabkan terjadinya Pasang Surut air laut di Bumi?", opts: ["Angin Topan", "Gaya Tarik Gravitasi Bulan", "Suhu Matahari"], ans: 1, pts: 4 },
                { q: "Berapa kemiringan sumbu rotasi Bumi yang menyebabkan pergantian Musim?", opts: ["23.5 Derajat", "90 Derajat", "0 Derajat"], ans: 0, pts: 4 },
                { q: "Fase saat bulan tidak terlihat sama sekali dari bumi karena posisinya sejajar dengan matahari disebut...", opts: ["Bulan Purnama", "Bulan Sabit", "Bulan Baru (New Moon)"], ans: 2, pts: 4 }
            ]},
            // STAGE 4: GERHANA (12 Poin) - Mode Spesial "Tap to Select"
            { stage: 4, name: "Zona Kalibrasi Eklips", questions: [
                { q: "Jika terjadi GERHANA MATAHARI, objek apa yang berada di TENGAH (menutupi cahaya)?", opts: ["BUMI", "BULAN", "MATAHARI"], ans: 1, pts: 6 },
                { q: "Bayangan inti paling gelap yang menyebabkan Gerhana Total disebut...", opts: ["Umbra", "Penumbra", "Korona"], ans: 0, pts: 6 }
            ]},
            // STAGE 5: MARS (12 Poin)
            { stage: 5, name: "Sektor Mars", questions: [
                { q: "Warna merah pada Planet Mars disebabkan oleh...", opts: ["Lava gunung berapi aktif", "Debu Besi Oksida (Karat) di permukaannya", "Pantulan cahaya cincin Saturnus"], ans: 1, pts: 4 },
                { q: "Gunung tertinggi di tata surya yang terletak di Mars adalah...", opts: ["Gunung Everest", "Olympus Mons", "Mauna Kea"], ans: 1, pts: 4 },
                { q: "Mars memiliki dua satelit alami (bulan) yaitu...", opts: ["Phobos & Deimos", "Titan & Europa", "Io & Ganymede"], ans: 0, pts: 4 }
            ]},
            // STAGE 6: SABUK ASTEROID (12 Poin)
            { stage: 6, name: "Sabuk Asteroid", questions: [
                { q: "INTERSEPSI RADAR: Sabuk Asteroid terletak di antara planet Mars dan Jupiter.", opts: ["CEK: FAKTA", "CEK: MITOS"], ans: 0, pts: 4 },
                { q: "INTERSEPSI RADAR: Asteroid adalah komet yang kehabisan es.", opts: ["CEK: FAKTA", "CEK: MITOS (Asteroid adalah sisa batuan berbatu/logam)"], ans: 1, pts: 4 },
                { q: "INTERSEPSI RADAR: Ceres adalah objek terbesar di sabuk asteroid dan berstatus Planet Kerdil.", opts: ["CEK: FAKTA", "CEK: MITOS"], ans: 0, pts: 4 }
            ]},
            // STAGE 7: JUPITER (12 Poin)
            { stage: 7, name: "Sektor Jupiter", questions: [
                { q: "Jupiter adalah planet 'Raksasa Gas' terbesar. Apa gas penyusun utamanya?", opts: ["Oksigen & Karbon Dioksida", "Hidrogen & Helium", "Nitrogen & Metana"], ans: 1, pts: 4 },
                { q: "Badai raksasa yang telah berlangsung ratusan tahun di permukaan Jupiter disebut...", opts: ["Bintik Merah Raksasa (Great Red Spot)", "Badai Matahari", "Kawah Gelap"], ans: 0, pts: 4 },
                { q: "Bulan terbesar milik Jupiter (dan terbesar di tata surya) adalah...", opts: ["Europa", "Titan", "Ganymede"], ans: 2, pts: 4 }
            ]},
            // STAGE 8: SATURNUS & URANUS (8 Poin)
            { stage: 8, name: "Sektor Es", questions: [
                { q: "Planet mana yang memiliki sistem cincin paling besar, terang, dan kompleks yang terbuat dari es dan batuan?", opts: ["Uranus", "Neptunus", "Saturnus"], ans: 2, pts: 4 },
                { q: "Planet ini sering disebut planet 'Menggelinding' karena sumbu rotasinya miring hingga 98 derajat. Planet apakah ini?", opts: ["Uranus", "Venus", "Mars"], ans: 0, pts: 4 }
            ]},
            // STAGE 9: NEPTUNUS (8 Poin)
            { stage: 9, name: "Sektor Neptunus", questions: [
                { q: "Warna biru cerah pada planet Uranus dan Neptunus disebabkan oleh keberadaan gas...", opts: ["Metana", "Oksigen", "Helium"], ans: 0, pts: 4 },
                { q: "PERTANYAAN PUNCAK: Selain status Planet Kerdil, daerah gelap dan dingin di luar orbit Neptunus tempat Pluto berada disebut...", opts: ["Awan Oort", "Sabuk Kuiper (Kuiper Belt)", "Sabuk Asteroid"], ans: 1, pts: 4 }
            ]}
        ];

        // --- SISTEM STATE ---
        let playerName = "";
        let totalScore = 0;
        let currentStageIdx = 0;
        let currentQIdx = 0;

        // Sound Engine
        const playSnd = (id) => { const s = document.getElementById(id); s.currentTime=0; s.play().catch(()=>{}); };

        // Inisialisasi
        window.onload = () => {
            playerName = localStorage.getItem('AstronotName') || 'Kadet Kosmik';
            document.getElementById('playerName').innerText = playerName.toUpperCase();
            buildTracker();
        };

        function buildTracker() {
            const tracker = document.getElementById('trackerList');
            tracker.innerHTML = '';
            missions.forEach((m, i) => {
                tracker.innerHTML += `<div class="stage-item" id="track-${i}"><span>S-${i+1}</span> <span>${m.name}</span></div>`;
            });
        }

        function updateTracker() {
            document.querySelectorAll('.stage-item').forEach(el => {
                el.classList.remove('active'); el.classList.remove('done');
            });
            for(let i=0; i < currentStageIdx; i++) document.getElementById(`track-${i}`).classList.add('done');
            if(currentStageIdx < missions.length) document.getElementById(`track-${currentStageIdx}`).classList.add('active');
        }

        // --- ENGINE KUIS ---
        function startFinalMission() {
            playSnd('sndClick');
            currentStageIdx = 0; currentQIdx = 0; totalScore = 0;
            document.getElementById('scoreDisplay').innerText = "0";
            loadQuestion();
        }

        function triggerWarp() {
            playSnd('sndWarp');
            document.getElementById('bgNebula').classList.add('warp-speed');
            setTimeout(() => { document.getElementById('bgNebula').classList.remove('warp-speed'); }, 500);
        }

        function loadQuestion() {
            if (currentStageIdx >= missions.length) {
                showResult(); return;
            }

            updateTracker();
            const stageData = missions[currentStageIdx];
            const qData = stageData.questions[currentQIdx];

            // Render UI
            document.getElementById('stageTitle').innerText = `🚀 ${stageData.name}`;
            document.getElementById('questionText').innerHTML = `<b>Transmisi Data:</b><br><br>${qData.q}`;
            
            const optsGrid = document.getElementById('optionsGrid');
            optsGrid.innerHTML = '';
            
            qData.opts.forEach((optText, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn-opt'; btn.innerText = optText;
                btn.onclick = () => checkAnswer(i, btn, qData);
                optsGrid.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElem, qData) {
            // Kunci tombol
            const allBtns = document.getElementById('optionsGrid').querySelectorAll('.btn-opt');
            allBtns.forEach(b => b.style.pointerEvents = 'none');

            if (selectedIndex === qData.ans) {
                btnElem.classList.add('correct');
                playSnd('sndCorrect');
                totalScore += qData.pts;
                document.getElementById('scoreDisplay').innerText = totalScore;
            } else {
                btnElem.classList.add('wrong');
                allBtns[qData.ans].classList.add('correct'); // Tunjukkan yg benar
                playSnd('sndWrong');
            }

            // Pindah soal / stage
            currentQIdx++;
            if (currentQIdx >= missions[currentStageIdx].questions.length) {
                currentStageIdx++; currentQIdx = 0;
                triggerWarp(); // Animasi pindah planet
                setTimeout(loadQuestion, 1200);
            } else {
                setTimeout(loadQuestion, 1200);
            }
        }

        // --- ENDGAME & SERTIFIKAT ---
        function showResult() {
            document.getElementById('quizArea').style.display = 'none';
            const resArea = document.getElementById('resultArea');
            resArea.classList.add('show');

            const rankEl = document.getElementById('rankTitle');
            const msgEl = document.getElementById('resultMessage');
            const btnGroup = document.getElementById('btnGroupResult');
            
            let title = ""; let color = "";

            if (totalScore >= 100) {
                title = "LEGENDARY STAR-LORD 👑"; color = "var(--neon-orange)";
                msgEl.innerText = "Sempurna! Anda adalah Penguasa Tata Surya sejati!";
            } else if (totalScore >= 90) {
                title = "GALACTIC COMMANDER 🚀"; color = "var(--neon-cyan)";
                msgEl.innerText = "Luar biasa! Strategi navigasi Anda sangat gemilang.";
            } else if (totalScore >= 80) {
                title = "ELITE NAVIGATOR 🛸"; color = "var(--neon-green)";
                msgEl.innerText = "Selamat! Anda resmi lulus Akademi ASTRO-QUEST.";
            } else {
                title = "MISI GAGAL 💥"; color = "var(--neon-pink)";
                msgEl.innerText = "Bahan bakar habis. Pengetahuan Anda belum cukup (Min. Skor: 80).";
            }

            rankEl.innerText = title; rankEl.style.color = color;

            if (totalScore >= 80) {
                // LULUS
                btnGroup.innerHTML = `
                    <button class="btn-action" onclick="generateAndDownloadCert('${title.replace(/[^a-zA-Z -]/g, '')}')">📥 UNDUH SERTIFIKAT KELULUSAN</button>
                    <button class="btn-action" style="background:transparent; border:2px solid var(--neon-cyan); color:var(--neon-cyan);" onclick="window.location.href='menu 3 sektor.html'">KEMBALI KE MENU</button>
                `;
            } else {
                // GAGAL
                btnGroup.innerHTML = `
                    <button class="btn-action" style="background:var(--neon-pink); box-shadow:var(--pink-glow);" onclick="location.reload()">🔄 ULANGI MISI FINAL</button>
                `;
            }
        }

        // --- HTML5 CANVAS CERTIFICATE GENERATOR ---
        function generateAndDownloadCert(rankName) {
            const canvas = document.getElementById('certCanvas');
            const ctx = canvas.getContext('2d');

            // 1. Gambar Latar Belakang (Biru Gelap Space)
            const gradient = ctx.createLinearGradient(0, 0, 1600, 1200);
            gradient.addColorStop(0, '#0B0D17');
            gradient.addColorStop(1, '#2D1B4E');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1600, 1130);

            // 2. Gambar Ornamen Border Neon
            ctx.strokeStyle = '#00F2FF'; ctx.lineWidth = 15;
            ctx.strokeRect(50, 50, 1500, 1030);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; ctx.lineWidth = 5;
            ctx.strokeRect(70, 70, 1460, 990);

            // 3. Teks Header
            ctx.textAlign = "center"; ctx.fillStyle = "#FF9900";
            ctx.font = "bold 80px sans-serif";
            ctx.fillText("CERTIFICATE OF COMPLETION", 800, 200);
            
            ctx.fillStyle = "#00F2FF"; ctx.font = "40px sans-serif";
            ctx.fillText("ASTRO-QUEST ACADEMY", 800, 260);

            // 4. Teks Deskripsi
            ctx.fillStyle = "#cbd5e1"; ctx.font = "35px sans-serif";
            ctx.fillText("Sertifikat ini dianugerahkan kepada:", 800, 400);

            // 5. Nama Pemain
            ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 100px sans-serif";
            ctx.shadowColor = "#00F2FF"; ctx.shadowBlur = 20;
            ctx.fillText(playerName.toUpperCase(), 800, 520);
            ctx.shadowBlur = 0; // reset shadow

            // 6. Teks Lulus
            ctx.fillStyle = "#cbd5e1"; ctx.font = "35px sans-serif";
            ctx.fillText("Atas keberhasilannya menaklukkan 9 Sektor Tata Surya dengan gelar:", 800, 620);

            // 7. Pangkat / Gelar
            ctx.fillStyle = (totalScore === 100) ? "#FF9900" : "#00E676"; 
            ctx.font = "bold 70px sans-serif";
            ctx.fillText(rankName, 800, 720);

            // 8. Skor & Tanda Tangan
            ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 50px sans-serif";
            ctx.fillText(`FINAL SCORE: ${totalScore} / 100`, 800, 850);

            ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "30px sans-serif";
            ctx.fillText("Disahkan secara elektronik oleh Sistem AI Astro-Quest", 800, 1000);

            // Trigger Download Image
            const dataURL = canvas.toDataURL("image/png");
            const link = document.createElement("a");
            link.download = `Sertifikat_AstroQuest_${playerName.replace(/\s/g, '_')}.png`;
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
