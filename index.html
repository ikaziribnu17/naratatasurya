<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO-QUEST: Splash Screen</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- KESEPAKATAN TEMA & WARNA --- */
        :root {
            --space-blue: #0B0D17;
            --galactic-purple: #2D1B4E;
            --neon-cyan: #00F2FF;
            --neon-orange: #FF9900;
            --cyan-glow: 0 0 15px rgba(0, 242, 255, 0.6);
            --orange-glow: 0 0 15px rgba(255, 153, 0, 0.6);
            --ui-bg: rgba(11, 13, 23, 0.85);
            --error-red: #FF3366;
            --red-glow: 0 0 15px rgba(255, 51, 102, 0.6);
            
            --font-heading: 'Fredoka', sans-serif;
            --font-body: 'Poppins', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--space-blue);
            color: #ffffff;
            font-family: var(--font-body);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- LATAR BELAKANG PARALAKS --- */
        .nebula-bg {
            position: absolute;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2048&auto=format&fit=crop') no-repeat center center/cover;
            z-index: 1;
            opacity: 0.6;
            animation: panSpace 40s infinite alternate linear;
            pointer-events: none;
        }

        @keyframes panSpace {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(-2%, -2%); }
        }

        /* --- BINGKAI KOKPIT --- */
        .cockpit-frame {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.9), inset 0 0 20px rgba(0, 242, 255, 0.3);
            border: 2px solid rgba(0, 242, 255, 0.1);
            pointer-events: none; z-index: 10;
        }

        /* --- LAYOUT UTAMA --- */
        .main-container {
            position: relative;
            z-index: 20;
            width: 90%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
        }

        /* --- KOLOM KIRI (LOGIN KOKPIT) --- */
        .login-section {
            flex: 1;
            max-width: 450px;
            animation: slideRight 1.5s ease-out;
        }

        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .cockpit-panel {
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(45, 27, 78, 0.5);
        }

        .panel-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--neon-cyan);
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 1px;
            border-bottom: 2px dashed rgba(0, 242, 255, 0.3);
            padding-bottom: 15px;
            text-shadow: var(--cyan-glow);
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            color: #A0AEC0;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-bottom: 2px solid rgba(0, 242, 255, 0.4);
            color: #fff;
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 500;
            padding: 12px 15px;
            border-radius: 8px 8px 0 0;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(0, 242, 255, 0.1);
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1);
        }

        .input-group input::placeholder {
            color: #64748B;
        }

        .btn-start {
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: var(--font-heading);
            font-size: 1.3rem;
            padding: 15px 20px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-start:hover {
            background: var(--neon-cyan);
            color: var(--space-blue);
            box-shadow: var(--cyan-glow);
            transform: translateY(-3px);
        }

        /* --- KOLOM KANAN (JUDUL BESAR & ASTRO-BOT) --- */
        .hero-section {
            flex: 1.2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: slideLeft 1.5s ease-out;
        }

        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .main-title {
            font-family: var(--font-heading);
            font-size: clamp(3.5rem, 5vw, 5rem);
            line-height: 1.1;
            color: #ffffff;
            text-shadow: var(--cyan-glow);
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .sub-title {
            font-family: var(--font-heading);
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            color: var(--neon-orange);
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: var(--orange-glow);
        }

        /* --- ASTRO-BOT MELAYANG --- */
        .floating-object-container {
            animation: float 5s ease-in-out infinite;
            position: relative;
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.7));
            margin-bottom: 15px;
        }

        .astro-bot-img {
            width: clamp(220px, 25vw, 350px);
            height: auto;
            object-fit: contain;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-20px) rotate(-2deg); }
        }

        /* --- TEKS AUTHOR DI BAWAH GAMBAR --- */
        .author-text {
            font-family: var(--font-body);
            font-size: clamp(0.85rem, 1vw, 1rem);
            color: #cbd5e1;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: rgba(45, 27, 78, 0.6);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            margin-top: 10px;
        }

        /* --- CUSTOM MODAL ERROR --- */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(11, 13, 23, 0.9); backdrop-filter: blur(5px);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box {
            background: var(--galactic-purple); border: 2px solid var(--error-red);
            padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: var(--red-glow); max-width: 400px; width: 85%;
            transform: scale(0.8); transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-box h2 { font-family: var(--font-heading); color: var(--error-red); margin-bottom: 15px; font-size: 1.8rem; letter-spacing: 1px;}
        .modal-box p { font-family: var(--font-body); font-size: 1.05rem; margin-bottom: 25px; line-height: 1.5; color: #F8FAFC;}
        .btn-close-modal {
            background: rgba(255, 51, 102, 0.1); border: 1px solid var(--error-red); color: var(--error-red);
            padding: 10px 30px; font-family: var(--font-heading); font-size: 1.2rem; font-weight: 500;
            border-radius: 8px; cursor: pointer; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-close-modal:hover { background: var(--error-red); color: #fff; box-shadow: var(--red-glow); }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 900px) {
            body { overflow-y: auto; align-items: flex-start; }
            .main-container {
                flex-direction: column;
                justify-content: flex-start;
                gap: 20px;
                padding: 40px 20px;
            }
            .hero-section {
                flex: none;
                order: 1;
            }
            .login-section {
                flex: none;
                order: 2;
                width: 100%;
            }
            .astro-bot-img { width: 220px; }
            .cockpit-panel { padding: 30px 20px; }
        }
        
        @media (max-height: 600px) {
            body { overflow-y: auto; align-items: flex-start; }
            .main-container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="nebula-bg"></div>
    <div class="cockpit-frame"></div>

    <div class="main-container">
        
        <div class="login-section">
            <div class="cockpit-panel">
                <h2 class="panel-title">LOGIN ASTRONOT</h2>
                
                <div class="input-group">
                    <label for="astronotName">ID Astronot (Nama)</label>
                    <input type="text" id="astronotName" placeholder="Masukkan nama kapten..." autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="stasiunName">Stasiun Asal (Sekolah)</label>
                    <input type="text" id="stasiunName" placeholder="Contoh: SMPN 1 Galaksi..." autocomplete="off">
                </div>

                <button class="btn-start" onclick="initiateLaunch()">Mulai Misi ➔</button>
            </div>
        </div>

        <div class="hero-section">
            <h1 class="main-title">ASTRO-QUEST</h1>
            <h2 class="sub-title">Media Pembelajaran Interaktif</h2>
            
            <div class="floating-object-container">
                <img src="https://raw.githubusercontent.com/ikaziribnu17/naratatasurya/refs/heads/main/astro%20bulan%20sabit.png" alt="Astro-Bot di Bulan Sabit" class="astro-bot-img">
            </div>
            
            <div class="author-text">
                MPI oleh IBNU RIZAKI S.Pd . Tahun 2026
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="errorModal">
        <div class="modal-box">
            <h2>Peringatan Sistem!</h2>
            <p>Kapten, ID Astronot dan Stasiun Asal tidak boleh kosong. Harap lengkapi data penerbangan!</p>
            <button class="btn-close-modal" onclick="closeModal()">SIAP, KAPTEN!</button>
        </div>
    </div>

    <audio id="audioHover" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="audioError" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
    <audio id="audioSuccess" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

    <script>
        const btnStart = document.querySelector('.btn-start');
        const audioHover = document.getElementById('audioHover');
        const audioError = document.getElementById('audioError');
        const audioSuccess = document.getElementById('audioSuccess');

        btnStart.addEventListener('mouseenter', () => {
            audioHover.currentTime = 0;
            audioHover.play().catch(e => {}); 
        });

        function initiateLaunch() {
            const astronotName = document.getElementById('astronotName').value.trim();
            const stasiunName = document.getElementById('stasiunName').value.trim();

            if (astronotName === "" || stasiunName === "") {
                audioError.play().catch(e => {});
                document.getElementById('errorModal').classList.add('active');
            } else {
                localStorage.setItem('AstronotName', astronotName);
                localStorage.setItem('StasiunName', stasiunName);

                audioSuccess.play().catch(e => {});

                btnStart.innerHTML = "MENYIAPKAN WARP DRIVE...";
                btnStart.style.background = "var(--neon-cyan)";
                btnStart.style.color = "var(--space-blue)";

                setTimeout(() => {
                    // Pindah secara otomatis ke menu utama setelah sukses login
                    window.location.href = "menu.html"; 
                }, 1500);
            }
        }

        function closeModal() {
            document.getElementById('errorModal').classList.remove('active');
        }
    </script>
</body>
</html>
